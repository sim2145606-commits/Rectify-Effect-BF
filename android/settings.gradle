pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    id("com.facebook.react.settings")
}

rootProject.name = 'Virtucam'

apply from: new File(["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle")

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand()
}

// expo-modules-core must be explicitly included as a Gradle subproject.
// The autolinking.gradle script does not register it automatically in this
// project setup, but MainActivity.kt and MainApplication.kt depend on its
// classes (ReactActivityDelegateWrapper, ReactNativeHostWrapper,
// ApplicationLifecycleDispatcher, SplashScreenManager).
include ':expo-modules-core'
project(':expo-modules-core').projectDir = new File(rootProject.projectDir, '../node_modules/expo-modules-core/android')

include ':app'
