<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtuCam Companion</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --accent: #4f9eff;
      --text: #e0e0e0;
      --ok: #4caf50;
      --warn: #ff9800;
      --err: #f44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      padding: 16px;
    }
    h1 { font-size: 1.3rem; color: var(--accent); margin-bottom: 16px; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.6;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
      gap: 8px;
    }
    .row:last-child { border-bottom: none; }
    .label { font-size: 0.9rem; }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .ok { background: rgba(76, 175, 80, 0.2); color: var(--ok); }
    .warn { background: rgba(255, 152, 0, 0.2); color: var(--warn); }
    .err { background: rgba(244, 67, 54, 0.2); color: var(--err); }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .btn:active { opacity: 0.8; }
    pre {
      font-size: 0.7rem;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    #refresh-btn { background: #333; }
  </style>
</head>
<body>
  <h1>VirtuCam Companion</h1>

  <div class="card">
    <h2>Status</h2>
    <div class="row">
      <span class="label">Companion</span>
      <span id="st-companion" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">IPC Directory</span>
      <span id="st-ipc" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Scope State</span>
      <span id="st-scope" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Config Staging</span>
      <span id="st-config" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Marker Source</span>
      <span id="st-marker" class="badge warn">Loading...</span>
    </div>
  </div>

  <div class="card">
    <h2>Actions</h2>
    <button class="btn" onclick="runAction()">Refresh Permissions and Config</button>
    <button class="btn" id="refresh-btn" onclick="loadStatus()" style="margin-top: 6px;">
      Reload Status
    </button>
  </div>

  <div class="card">
    <h2>Companion Logs</h2>
    <pre id="log-output">Loading logs...</pre>
  </div>

  <script>
    const IPC = "/dev/virtucam_ipc";

    async function ksuExec(cmd) {
      try {
        const res = await fetch("/api/exec", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cmd })
        });
        const raw = await res.text();
        if (!raw) return "";
        try {
          const j = JSON.parse(raw);
          if (typeof j === "string") return j;

          const data = (j && typeof j === "object") ? j : {};
          const nested = (data.data && typeof data.data === "object") ? data.data : {};
          const candidates = [
            data.stdout, data.stderr, data.output, data.result, data.response, data.Response,
            nested.stdout, nested.stderr, nested.output, nested.result, nested.response, nested.Response,
          ].filter(v => typeof v === "string" && v.length > 0);

          if (candidates.length > 0) return candidates.join("");
          return raw;
        } catch {
          return raw;
        }
      } catch (e) {
        return "exec_error: " + e.message;
      }
    }

    function setBadge(id, text, cls) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "badge " + cls;
    }

    function toState(raw) {
      return String(raw || "").trim().toLowerCase();
    }

    async function loadStatus() {
      const ipcMount = await ksuExec(`mountpoint -q ${IPC} && echo mounted || echo missing`);
      setBadge("st-ipc", toState(ipcMount) === "mounted" ? "Mounted" : "Missing", toState(ipcMount) === "mounted" ? "ok" : "err");

      const companionStatus = toState(await ksuExec(`cat ${IPC}/state/companion_status 2>/dev/null`));
      if (companionStatus === "ready") {
        setBadge("st-companion", "READY", "ok");
      } else if (!companionStatus) {
        setBadge("st-companion", "PENDING", "warn");
      } else {
        setBadge("st-companion", companionStatus.toUpperCase(), companionStatus === "scope_mismatch" ? "err" : "warn");
      }

      const scopeState = toState(await ksuExec(`cat ${IPC}/state/scope_status 2>/dev/null`));
      setBadge(
        "st-scope",
        scopeState ? scopeState.toUpperCase() : "UNKNOWN",
        scopeState === "scope_ok" ? "ok" : (scopeState ? "err" : "warn")
      );

      const configStateRaw = toState(await ksuExec(`cat ${IPC}/state/config_status 2>/dev/null`));
      let configState = configStateRaw;
      if (!configState) {
        const configReady = toState(await ksuExec(`[ -r ${IPC}/config/virtucam_config.json ] && echo yes || echo no`));
        configState = configReady === "yes" ? "config_ready" : "config_missing";
      }
      setBadge(
        "st-config",
        configState.toUpperCase(),
        configState === "config_ready" ? "ok" : "warn"
      );

      const markerSourceRaw = toState(await ksuExec(`cat ${IPC}/state/marker_source 2>/dev/null`));
      let markerSource = markerSourceRaw;
      if (!markerSource) {
        const markerIpc = toState(await ksuExec(`[ -e ${IPC}/state/module_active ] && echo ipc || echo none`));
        if (markerIpc === "ipc") {
          markerSource = "ipc";
        } else {
          const markerLegacy = toState(await ksuExec(`[ -e /data/local/tmp/virtucam_module_active ] && echo legacy || echo none`));
          markerSource = markerLegacy;
        }
      }
      setBadge(
        "st-marker",
        markerSource === "none" || !markerSource ? "NONE" : markerSource.toUpperCase(),
        markerSource === "ipc" || markerSource === "legacy" ? "ok" : "warn"
      );

      const logs = await ksuExec(`tail -80 ${IPC}/logs/service.log 2>/dev/null || tail -80 /data/adb/modules/virtucam_companion/logs/service.log 2>/dev/null || echo "No logs yet"`);
      document.getElementById("log-output").textContent = logs || "No logs";
    }

    async function runAction() {
      const out = await ksuExec(`sh /data/adb/modules/virtucam_companion/action.sh 2>&1`);
      document.getElementById("log-output").textContent = out;
      setTimeout(loadStatus, 1200);
    }

    loadStatus();
  </script>
</body>
</html>
