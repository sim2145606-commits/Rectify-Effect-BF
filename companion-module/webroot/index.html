<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtuCam Companion</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --accent: #4f9eff;
      --text: #e0e0e0;
      --ok: #4caf50;
      --warn: #ff9800;
      --err: #f44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      padding: 16px;
    }
    h1 { font-size: 1.3rem; color: var(--accent); margin-bottom: 16px; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.6;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .row:last-child { border-bottom: none; }
    .label { font-size: 0.9rem; }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .ok { background: rgba(76, 175, 80, 0.2); color: var(--ok); }
    .warn { background: rgba(255, 152, 0, 0.2); color: var(--warn); }
    .err { background: rgba(244, 67, 54, 0.2); color: var(--err); }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .btn:active { opacity: 0.8; }
    pre {
      font-size: 0.7rem;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    #refresh-btn { background: #333; }
  </style>
</head>
<body>
  <h1>VirtuCam Companion</h1>

  <div class="card">
    <h2>Status</h2>
    <div class="row">
      <span class="label">Companion</span>
      <span id="st-companion" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">IPC Directory</span>
      <span id="st-ipc" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">LSPosed Scope</span>
      <span id="st-scope" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">SharedPrefs</span>
      <span id="st-prefs" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Module Active</span>
      <span id="st-module" class="badge warn">Loading...</span>
    </div>
  </div>

  <div class="card">
    <h2>Actions</h2>
    <button class="btn" onclick="runAction()">Refresh Permissions and Config</button>
    <button class="btn" id="refresh-btn" onclick="loadStatus()" style="margin-top: 6px;">
      Reload Status
    </button>
  </div>

  <div class="card">
    <h2>Companion Logs</h2>
    <pre id="log-output">Loading logs...</pre>
  </div>

  <script>
    const IPC = "/dev/virtucam_ipc";
    const PKG = "com.briefplantrain.virtucam";

    async function ksuExec(cmd) {
      try {
        const res = await fetch("/api/exec", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cmd })
        });
        const j = await res.json();
        return (j.stdout || "") + (j.stderr || "");
      } catch (e) {
        return "exec_error: " + e.message;
      }
    }

    function setBadge(id, text, cls) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "badge " + cls;
    }

    async function loadStatus() {
      const companionStatus = await ksuExec(`cat ${IPC}/state/companion_status 2>/dev/null`);
      setBadge(
        "st-companion",
        companionStatus.includes("ready") ? "Ready" : "Pending",
        companionStatus.includes("ready") ? "ok" : "warn"
      );

      const ipcMount = await ksuExec(`mountpoint -q ${IPC} && echo "mounted" || echo "not mounted"`);
      setBadge(
        "st-ipc",
        ipcMount.includes("mounted") ? "Mounted" : "Not Mounted",
        ipcMount.includes("mounted") ? "ok" : "err"
      );

      const prefsPerms = await ksuExec(
        `ls -la /data/data/${PKG}/shared_prefs/virtucam_config.xml 2>/dev/null | awk '{print $1}'`
      );
      const worldReadable = prefsPerms.includes("-r--r--") || prefsPerms.includes("-rw-r--r--");
      setBadge(
        "st-prefs",
        worldReadable ? "World-Readable" : (prefsPerms.trim() ? "Restricted" : "Not Found"),
        worldReadable ? "ok" : (prefsPerms.trim() ? "warn" : "err")
      );

      const moduleActive = await ksuExec(`cat ${IPC}/state/module_active 2>/dev/null`);
      setBadge(
        "st-module",
        moduleActive.includes("active") ? "Active" : "Inactive",
        moduleActive.includes("active") ? "ok" : "warn"
      );

      const scopeCheck = await ksuExec(
        `sqlite3 /data/adb/lspd/config/modules_config.db ` +
        `"SELECT enabled FROM modules WHERE module_pkg_name='${PKG}';" 2>/dev/null || echo "unknown"`
      );
      setBadge(
        "st-scope",
        scopeCheck.trim() === "1" ? "Scoped" : "Check Manually",
        scopeCheck.trim() === "1" ? "ok" : "warn"
      );

      const logs = await ksuExec(`tail -50 ${IPC}/logs/service.log 2>/dev/null || echo "No logs yet"`);
      document.getElementById("log-output").textContent = logs || "No logs";
    }

    async function runAction() {
      const out = await ksuExec(`sh /data/adb/modules/virtucam_companion/action.sh 2>&1`);
      document.getElementById("log-output").textContent = out;
      setTimeout(loadStatus, 1500);
    }

    loadStatus();
  </script>
</body>
</html>
