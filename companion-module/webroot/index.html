<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtuCam Companion</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --accent: #4f9eff;
      --text: #e0e0e0;
      --ok: #4caf50;
      --warn: #ff9800;
      --err: #f44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      padding: 16px;
    }
    h1 { font-size: 1.3rem; color: var(--accent); margin-bottom: 16px; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.6;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
      gap: 8px;
    }
    .row:last-child { border-bottom: none; }
    .label { font-size: 0.9rem; }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .ok { background: rgba(76, 175, 80, 0.2); color: var(--ok); }
    .warn { background: rgba(255, 152, 0, 0.2); color: var(--warn); }
    .err { background: rgba(244, 67, 54, 0.2); color: var(--err); }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .btn:active { opacity: 0.8; }
    pre {
      font-size: 0.7rem;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    #refresh-btn { background: #333; }
  </style>
</head>
<body>
  <h1>VirtuCam Companion</h1>

  <div class="card">
    <h2>Status</h2>
    <div class="row">
      <span class="label">Companion</span>
      <span id="st-companion" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">IPC Directory</span>
      <span id="st-ipc" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Primary Config</span>
      <span id="st-primary" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Hook Readback</span>
      <span id="st-hookread" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Runtime Fresh</span>
      <span id="st-fresh" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Effective Source</span>
      <span id="st-source" class="badge warn">Loading...</span>
    </div>
    <div class="row">
      <span class="label">Last Error</span>
      <span id="st-error" class="badge warn">Loading...</span>
    </div>
  </div>

  <div class="card">
    <h2>Actions</h2>
    <button class="btn" onclick="runAction()">Refresh Permissions and Config</button>
    <button class="btn" id="refresh-btn" onclick="loadStatus()" style="margin-top: 6px;">
      Reload Status
    </button>
  </div>

  <div class="card">
    <h2>Companion Logs</h2>
    <pre id="log-output">Loading logs...</pre>
  </div>

  <script>
    const IPC = "/dev/virtucam_ipc";
    const RUNTIME_STALE_MS = 180000;

    async function ksuExec(cmd) {
      try {
        const res = await fetch("/api/exec", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cmd })
        });
        const raw = await res.text();
        if (!raw) return "";
        try {
          const j = JSON.parse(raw);
          if (typeof j === "string") return j;

          const data = (j && typeof j === "object") ? j : {};
          const nested = (data.data && typeof data.data === "object") ? data.data : {};
          const candidates = [
            data.stdout, data.stderr, data.output, data.result, data.response, data.Response,
            nested.stdout, nested.stderr, nested.output, nested.result, nested.response, nested.Response,
          ].filter(v => typeof v === "string" && v.length > 0);

          if (candidates.length > 0) return candidates.join("");
          return raw;
        } catch {
          return raw;
        }
      } catch (e) {
        return "exec_error: " + e.message;
      }
    }

    function setBadge(id, text, cls) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "badge " + cls;
    }

    function toState(raw) {
      return String(raw || "").trim().toLowerCase();
    }

    function parseRuntimeState(raw) {
      try {
        const parsed = JSON.parse(String(raw || "").trim());
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    async function readRuntimeState() {
      const json = await ksuExec(`cat ${IPC}/state/runtime_state.json 2>/dev/null`);
      if (json && json.trim().startsWith("{")) {
        return parseRuntimeState(json);
      }
      const fallback = await ksuExec(`cat /data/adb/virtucam/state/runtime_state.json 2>/dev/null`);
      return parseRuntimeState(fallback);
    }

    async function loadStatus() {
      const ipcMount = await ksuExec(`mountpoint -q ${IPC} && echo mounted || echo missing`);
      setBadge("st-ipc", toState(ipcMount) === "mounted" ? "Mounted" : "Missing", toState(ipcMount) === "mounted" ? "ok" : "err");

      const companionState = toState(await ksuExec(`cat ${IPC}/state/companion_status 2>/dev/null`));
      const runtime = await readRuntimeState();
      const runtimeReady = runtime.runtime_ready === true;
      const hookReadOk = runtime.hook_last_read_ok === true;
      const primaryReadable = runtime.config_primary_readable === true;
      const updatedEpochMs = Number(runtime.updated_epoch_ms || 0);
      const fresh = updatedEpochMs > 0 && (Date.now() - updatedEpochMs) <= RUNTIME_STALE_MS;
      const healthy = runtimeReady && hookReadOk && fresh;

      if (healthy && companionState === "ready") {
        setBadge("st-companion", "READY", "ok");
      } else if (!companionState) {
        setBadge("st-companion", "PENDING", "warn");
      } else {
        setBadge("st-companion", companionState.toUpperCase(), companionState === "scope_mismatch" ? "err" : "warn");
      }

      setBadge("st-primary", primaryReadable ? "READABLE" : "UNREADABLE", primaryReadable ? "ok" : "err");
      setBadge("st-hookread", hookReadOk ? "OK" : "FAILED", hookReadOk ? "ok" : "err");
      setBadge("st-fresh", fresh ? "FRESH" : "STALE", fresh ? "ok" : "warn");

      const sourceEffective = String(runtime.source_mode_effective || "black").trim().toUpperCase();
      setBadge("st-source", sourceEffective || "BLACK", sourceEffective === "BLACK" ? "warn" : "ok");

      const errCode = String(runtime.last_error_code || "").trim();
      if (!errCode || errCode === "none") {
        setBadge("st-error", "NONE", "ok");
      } else {
        setBadge("st-error", errCode.toUpperCase(), "err");
      }

      const logs = await ksuExec(`tail -80 ${IPC}/logs/service.log 2>/dev/null || tail -80 /data/adb/modules/virtucam_companion/logs/service.log 2>/dev/null || echo "No logs yet"`);
      document.getElementById("log-output").textContent = logs || "No logs";
    }

    async function runAction() {
      const out = await ksuExec(`sh /data/adb/modules/virtucam_companion/action.sh 2>&1`);
      document.getElementById("log-output").textContent = out;
      setTimeout(loadStatus, 1200);
    }

    loadStatus();
  </script>
</body>
</html>
