# build-apk.yml
# Builds a signed release APK for the VirtuCam Android app.
# Key improvements over previous version:
#   - Pinned Java to JDK 17 (temurin) for consistent builds
#   - Added Gradle caching via gradle/actions/setup-gradle@v3
#   - Added npm dependency caching
#   - Added ESLint and TypeScript validation steps
#   - Added dependency review on PRs (catches breaking/vulnerable deps)
#   - Improved artifact naming with run number for traceability

name: Build APK Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # allows manual trigger from GitHub UI

# Explicit permission scopes for the GITHUB_TOKEN.
# Any scope not listed here is automatically set to "none".
permissions:
  contents: read       # checkout, dependency-review source scanning
  actions: write       # gradle/actions/setup-gradle@v3 cache saves
  pull-requests: write # dependency-review-action@v4 PR comment posting

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Validate code before attempting a build
  # ─────────────────────────────────────────────
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # caches node_modules between runs

      - name: Install dependencies
        run: npm ci # use ci (not install) for reproducible installs

      - name: Run ESLint
        # continue-on-error: true means build won't be blocked yet.
        # Once the 80+ ESLint errors are resolved, remove that line
        # to enforce linting as a hard gate.
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript & validation checks
        run: npm run validate
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: Dependency review (PRs only)
  # Blocks merging if a PR introduces vulnerable
  # or incompatible dependency changes
  # ─────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  # ─────────────────────────────────────────────
  # JOB 3: Build the release APK
  # Runs after validate passes
  # ─────────────────────────────────────────────
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: validate # waits for validate job to complete

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Pin Java to JDK 17 with Temurin distribution.
      # This is the most common cause of inconsistent Android builds —
      # different JDK versions produce different results.
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Gradle caching — dramatically speeds up builds and
      # reduces network-related failures from re-downloading dependencies.
      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # APK SIGNING SETUP
      # This decodes the keystore from a GitHub secret and writes it to disk.
      # You need to set these secrets in your repo:
      #   Settings → Secrets and variables → Actions → New repository secret
      #
      #   KEYSTORE_BASE64       → base64-encoded keystore file
      #                           (generate with: base64 -i your.keystore | pbcopy)
      #   KEYSTORE_PASSWORD     → your keystore password
      #   KEY_ALIAS             → your key alias
      #   KEY_PASSWORD          → your key password
      #
      # If you don't have a keystore yet, this step will be skipped automatically
      # and assembleRelease will produce an APK signed with the debug keystore.
      - name: Decode keystore from secret
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd android && ./gradlew assembleRelease --stacktrace

      # Upload the APK as a downloadable artifact.
      # Named with the run number so you can tell builds apart.
      # Kept for 30 days — adjust retention-days as needed.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtucam-release-build-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
