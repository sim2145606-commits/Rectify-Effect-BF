name: Android Release Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Node.js ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 2. JS dependencies ───────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # ── 3. JDK (needed by Gradle, set up before prebuild so JAVA_HOME is
      #         available if any Expo plugin inspects it during prebuild) ────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Expo Prebuild ─────────────────────────────────────────────────────
      # Regenerates the entire android/ native directory from scratch, including
      # android/build/generated/autolinking/autolinking.json which Gradle's
      # GeneratePackageListTask requires at task-graph construction time.
      # --clean  : wipes any previously committed android/ dir before regenerating
      # --no-install : skips re-running npm install (already done above)
      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install

      # ── 5b. Patch generated android files after expo prebuild ─────────────────
      # expo prebuild generates enableBundleCompression in app/build.gradle but
      # ReactExtension in RN 0.76 doesn't support this property → crash.
      # Fix: delete that line from the generated file.
      #
      # NOTE: We do NOT override kotlinVersion here. Expo SDK 52 (expo-modules-core
      # 2.2.3) uses Kotlin 1.9.25 which is correct for its Gradle plugin. The
      # kotlin-compose-compiler-plugin-embeddable artifact only exists for Kotlin
      # 2.0+, so forcing 2.0.21 would break the SDK 52 build.
      - name: Patch generated android files after expo prebuild
        run: |
          sed -i '/enableBundleCompression/d' android/app/build.gradle

      # ── 6. Gradle permissions ────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 7. Build ─────────────────────────────────────────────────────────────
      # NOTE: Do NOT set NODE_ENV=production here. When set, npm skips devDependencies
      # (including metro) during install, causing createBundleReleaseJsAndAssets to
      # fail with "Cannot find module 'metro/src/lib/TerminalReporter'".
      # Gradle's assembleRelease already builds a release APK without this env var.
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --build-cache -x lint -x test --stacktrace

      # ── 8. Upload artefacts ──────────────────────────────────────────────────
      - name: Upload Release APK (by commit)
        uses: actions/upload-artifact@v4
        with:
          name: virtucam-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK (latest)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: virtucam-release-latest
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 90

  # ── GitHub Release (tag pushes only) ────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: virtucam-release-latest
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/app-release.apk
          generate_release_notes: true
          name: VirtuCam ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
