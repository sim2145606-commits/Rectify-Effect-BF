name: Android Release Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Node.js ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 2. JS dependencies ───────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # ── 3. JDK (needed by Gradle, set up before prebuild so JAVA_HOME is
      #         available if any Expo plugin inspects it during prebuild) ────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Expo Prebuild ─────────────────────────────────────────────────────
      # This regenerates the entire android/ native directory from scratch,
      # including android/build/generated/autolinking/autolinking.json which
      # Gradle's GeneratePackageListTask requires at task-graph construction time.
      # Running with --clean ensures no stale artefacts from a previously
      # committed android/ directory interfere with the build.
      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --non-interactive

      # ── 5. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Gradle permissions ────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 7. Build ─────────────────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --build-cache -x lint -x test --stacktrace
        env:
          NODE_ENV: production

      # ── 8. Upload artefacts ──────────────────────────────────────────────────
      - name: Upload Release APK (by commit)
        uses: actions/upload-artifact@v4
        with:
          name: virtucam-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK (latest)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: virtucam-release-latest
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 90

  # ── GitHub Release (tag pushes only) ────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: virtucam-release-latest
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/app-release.apk
          generate_release_notes: true
          name: VirtuCam ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
