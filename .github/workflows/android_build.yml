name: Android Release Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Node.js ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 2. JS dependencies ───────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # ── 3. JDK (needed by Gradle, set up before prebuild so JAVA_HOME is
      #         available if any Expo plugin inspects it during prebuild) ────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Expo Prebuild ─────────────────────────────────────────────────────
      # Regenerates the entire android/ native directory from scratch, including
      # android/build/generated/autolinking/autolinking.json which Gradle's
      # GeneratePackageListTask requires at task-graph construction time.
      # --clean  : wipes any previously committed android/ dir before regenerating
      # --no-install : skips re-running npm install (already done above)
      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install

      # ── 5b. Patch generated android files after expo prebuild ─────────────────
      # Fix 1 — Kotlin version:
      #   react-native 0.76's bundled libs.versions.toml sets kotlin="1.9.25".
      #   useExpoVersionCatalog() loads that TOML as the base for the "expoLibs"
      #   version catalog, then overrides entries only when the Gradle property
      #   android.kotlinVersion is present. ExpoRootProjectPlugin reads kotlinVersion
      #   from the catalog → gets 1.9.25 → KSPLookup has no entry → crash.
      #   Fix: set android.kotlinVersion=2.0.21 so the catalog override fires.
      #
      # Fix 2 — enableBundleCompression:
      #   expo prebuild generates enableBundleCompression in app/build.gradle but
      #   ReactExtension in RN 0.76 doesn't support this property → crash.
      #   Fix: delete that line from the generated file.
      - name: Patch generated android files after expo prebuild
        run: |
          sed -i 's/^kotlinVersion=.*/kotlinVersion=2.0.21/' android/gradle.properties
          grep -q '^android\.kotlinVersion=' android/gradle.properties \
            && sed -i 's/^android\.kotlinVersion=.*/android.kotlinVersion=2.0.21/' android/gradle.properties \
            || echo 'android.kotlinVersion=2.0.21' >> android/gradle.properties
          sed -i '/enableBundleCompression/d' android/app/build.gradle

      # ── 6. Gradle permissions ────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 7. Build ─────────────────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --build-cache -x lint -x test --stacktrace
        env:
          NODE_ENV: production

      # ── 8. Upload artefacts ──────────────────────────────────────────────────
      - name: Upload Release APK (by commit)
        uses: actions/upload-artifact@v4
        with:
          name: virtucam-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK (latest)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: virtucam-release-latest
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 90

  # ── GitHub Release (tag pushes only) ────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: virtucam-release-latest
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/app-release.apk
          generate_release_notes: true
          name: VirtuCam ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
