name: Android Release Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # Fix: Cache ~/.gradle/caches and ~/.gradle/wrapper (not ~/.android/build-cache
      # which is the wrong path and was never being populated by Gradle).
      # Also include android/.gradle for project-level Gradle caches.
      - name: Cache Gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper permissions
        run: chmod +x android/gradlew

      - name: Set NODE_ENV
        run: echo "NODE_ENV=production" >> $GITHUB_ENV

      # Fix: Pre-generate autolinking.json by running :expo:generatePackagesList
      # as a separate Gradle invocation BEFORE assembleRelease.
      #
      # Root cause: :app:generateAutolinkingPackageList (React Native plugin) reads
      # android/build/generated/autolinking/autolinking.json, but Gradle has no
      # declared dependency on :expo:generatePackagesList (Expo plugin) which writes
      # that file. In a cold-cache CI environment the file is absent when the RN task
      # runs, causing the build to fail. Running the Expo task first guarantees the
      # file exists before assembleRelease starts.
      - name: Generate Expo autolinking manifest
        working-directory: android
        run: ./gradlew :expo:generatePackagesList --stacktrace
        env:
          NODE_ENV: production

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --build-cache -x lint -x test --stacktrace
        env:
          NODE_ENV: production

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: virtucam-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Release APK (Latest)
        uses: actions/upload-artifact@v4
        with:
          name: virtucam-release-latest
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: virtucam-release-latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          generate_release_notes: true
          name: VirtuCam ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
