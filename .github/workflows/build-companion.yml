name: Build Companion Module

on:
  push:
    paths:
      - "companion-module/**"
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build companion ZIP
        run: |
          chmod +x companion-module/build.sh
          bash companion-module/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtucam-companion
          path: out/virtucam-companion.zip
          retention-days: 30
